# Copy this file to paths.local.yaml and fill in paths that exist on your machine.
# paths.local.yaml is gitignored — do not commit machine-specific paths.
#
#   copy config\paths.example.yaml config\paths.local.yaml
#
# Paths can be:
#   - full path to a feature class / raster in a file geodatabase
#   - full path to a shapefile / GeoJSON / TIFF
#   - layer name in the open ArcGIS Pro map (if script resolves via aprx)

workspace: "C:/Users/YOU/Documents/ArcGIS/Projects/northwoods_faa/northwoods_faa.gdb"

# Existing WFE hexes (~6,895 × ~10,000 acres) — from prior northwoods work
hexes: "C:/Users/YOU/Documents/ArcGIS/Projects/northwoods_faa/northwoods_faa.gdb/nw_aoi_hex_10k"
hex_id_field: "GRID_ID"
wfe_mean_field: "MEAN"
wfe_cat_field: "WFE_CAT"

# AOI (Bailey ecoregions boundary from prior work)
aoi: "C:/Users/YOU/Documents/ArcGIS/Projects/northwoods_faa/northwoods_faa.gdb/nw_aoi"

# Rasters — local only; never commit
# WRTC (May 2024): see config/WRTC_DATASETS.md
wrtc_housing_unit_risk: "C:/path/to/nw_aoi_hu_risk"           # PRIMARY people risk
wrtc_housing_unit_exposure: "C:/path/to/nw_aoi_hu_exposure"   # companion
wrtc_housing_unit_density: "C:/path/to/nw_aoi_hu_density"     # where homes are
wrtc_risk_reduction_zones: ""   # optional CWiRRZ categorical
wrtc_risk_to_homes: ""          # optional RPS / wall-to-wall; not primary for protect
# legacy alias — point at Housing Unit Risk
wrtc_housing_exposure: "C:/path/to/nw_aoi_hu_risk"
landfire_evt: "C:/path/to/nw_aoi_evt"
# optional triangulation (not ranking drivers for v1)
whp: ""
burn_probability: ""

# PAD-US: raster (cell values = GAP status) or polygon. See config/PADUS_AND_RESILIENT.md
padus: "C:/path/to/nw_aoi_pad"
padus_type: "raster"            # or "polygon"
padus_gap_field: "GAP_Sts"      # polygons only
padus_gap_include: "1,2,3"
# optional later
resilient_lands: ""
plantations: ""
infrastructure: ""
mills: ""
silvis_wui: ""

# Disturbance polygons (toggleable in dashboard)
disturbances_dir: "data/disturbances"

# Where scripts write hex outputs for GitHub / Quarto
output_hex_dir: "outputs/hex"
output_hex_geojson: "outputs/hex/faa_hex_scores.geojson"
output_hex_csv: "outputs/hex/faa_hex_scores.csv"
